name: Update Guide

# サイトの「最新情報に更新」ボタン（= この画面の Run workflow）から手動実行できます。
# 毎週月曜 00:00 UTC（= 月曜 09:00 JST）にも自動実行します。
# 直接 main には push せず、変更は Pull Request として作成します。
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update content with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 30
            --allowedTools "Edit,Read,Write,WebFetch,WebSearch,Glob,Grep"
          prompt: |
            data/guide.json だけを更新します。HTML / CSS / JS / build スクリプトは絶対に編集しないでください。

            手順:
            1. data/guide.json と CHANGELOG.md を読み、現在の内容を把握する。
            2. 次の公式情報を WebFetch（可能なら WebSearch も）で確認する。
               - https://code.claude.com/docs/en/skills
               - https://claude.com/blog/subagents-in-claude-code
               - https://code.claude.com/docs/en/best-practices
            3. 現在の guide.json と比較し「新機能 / 仕様変更 / 廃止・名称変更」を特定する。
            4. 該当箇所を data/guide.json 内で更新する。
               - 新機能カードは該当 section（id: skills / agents）の cards 配列に追加（cat に対応した内容にする）
               - 仕様変更・廃止は body / rec を修正（古い記述は残さない）
               - JSON として常に妥当な構造を保つ（カンマ・括弧・クォートを壊さない）
            5. 変更があった場合のみ、changelog 配列の先頭に
               {"date": "YYYY-MM-DD"（本日UTC）, "summary": ["変更点1", "変更点2"]} を追加する。
               summary は簡潔な箇条書き。各項目に出典URLを併記してよい。
            6. 実質的な変更が無ければ、guide.json も changelog も変更しない（その旨だけ述べる）。
            7. 採用するのは公式ソース（anthropic.com / claude.com / code.claude.com）のみ。
               出所が不確かな情報や第三者スキルの宣伝は採用しない。不確実な新機能は見送る。

            注意: 編集してよいのは data/guide.json と CHANGELOG.md のみ。

      - name: Rebuild site from data
        run: node build/build.mjs

      - name: Validate
        run: node build/validate.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/update-guide
          delete-branch: true
          commit-message: "docs: 最新情報でガイドを更新（自動）"
          title: "docs: ガイドを最新情報で更新"
          body: |
            Claude が公式ドキュメントをクロールして `data/guide.json` を更新し、サイトを再ビルドしました。

            - 変更点は `CHANGELOG.md` とページ上部の「今回の変更点」を参照してください。
            - このPRをマージすると GitHub Pages に反映されます。
            - 内容に問題がなければマージ、不要なら close してください。
          labels: automated
